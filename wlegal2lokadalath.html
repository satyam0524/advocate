// Function to populate branch filter dropdown
  function initBranchFilter() {
    var branchColumn = table.column(1); // Branch is column index 1 (second column)
    var uniqueBranches = [];
    var normalizedBranches = {}; // To track normalized branch names
    
    // Get all unique branch values from the data
    var allData = table.rows().data().toArray();
    
    allData.forEach(function(rowData) {
      var branch = rowData[1]; // Branch value is at index 1
      if (branch) {
        // Normalize branch name (trim whitespace and convert to uppercase for comparison)
        var normalizedBranch = branch.toString().trim().toUpperCase();
        
        // If this normalized branch hasn't been seen before
        if (!normalizedBranches[normalizedBranch]) {
          // Store the original branch name (first occurrence)
          uniqueBranches.push(branch.toString().trim());
          // Mark this normalized branch as seen
          normalizedBranches[normalizedBranch] = true;
        }
      }
    });
    
    // Sort branches alphabetically (case-insensitive)
    uniqueBranches.sort(function(a, b) {
      return a.toLowerCase().localeCompare(b.toLowerCase());
    });
    
    // Clear existing options except the first one
    var branchFilter = $('#branchFilter');
    branchFilter.find('option:not(:first)').remove();
    
    // Populate dropdown with unique branches
    uniqueBranches.forEach(function(branch) {
      branchFilter.append('<option value="' + branch + '">' + branch + '</option>');
    });
  }

  // Custom search function for branch filtering
  function applyBranchFilter() {
    if (currentBranchFilter) {
      // Add custom search function for branch filtering
      $.fn.dataTable.ext.search.push(
        function(settings, data, dataIndex) {
          var branchValue = data[1]; // Branch is in column index 1
          if (!currentBranchFilter) return true;
          
          // Compare normalized values (case-insensitive)
          return branchValue.toString().trim().toUpperCase() === 
                 currentBranchFilter.toString().trim().toUpperCase();
        }
      );
    }
  }

  // Event handler for branch filter dropdown

    var selectedBranch = $(this).val();
    currentBranchFilter = selectedBranch;
    
    // Apply the filter and redraw

  });

    // Clear any existing custom search functions
    $.fn.dataTable.ext.search = [];
    
    // Apply branch filter if one is selected
    applyBranchFilter();
    
    // Call the original draw function
    return originalDraw.call(this);
  };

      function setCookie(name, value, minutes) {
        const d = new Date();
        d.setTime(d.getTime() + (minutes * 60 * 1000));
        document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
      }

      function getCookie(name) {
        const nameEQ = name + "=";
        const ca = document.cookie.split(';');
        for (let i = 0; i < ca.length; i++) {
          let c = ca[i].trim();
          if (c.indexOf(nameEQ) === 0) {
            
            return decodeURIComponent(c.substring(nameEQ.length, c.length));
           
          }
        }
        return null;
      }



        function updateDisplay(data) {
        const now = Date.now();
        $('#count').text(data.count);
         const $link = $('.myLink');
        
        if ($link && $link.length > 0) {
          if (data.expiry && now <= data.expiry) {
            // window active
            if (data.count >= 20) {
              $link.addClass('disabled');
              
            } else {
              $link.removeClass('disabled');
            }
          } else {
            // no active window or expired: always active
            $link.removeClass('disabled');
            
          }
        }

        // Update message based on state
        if (data.expiry && now <= data.expiry) {
          
          const minutesLeft = Math.max(0, (data.expiry - now) / 60000);


          // Extract whole minutes and remaining seconds
                 const wholeMinutes = Math.floor(minutesLeft);
                const seconds = Math.floor((minutesLeft - wholeMinutes) * 60);
          
          if (data.count >= 20) {
            $('#message')
              .text(` Limit reached. Wait ${wholeMinutes} Min and ${seconds} seconds.`)
              .removeClass('info').addClass('warning');
          } else {
            const remaining = 20 - data.count;
            $('#message')
              .text(`${remaining} notices remaining . Expires in ${wholeMinutes} Min and ${seconds} seconds.`)
              .removeClass('warning').addClass('info');
          }
        } else {
          // No active window or expired — show default
          if (data.count === 0) {
            $('#message')
              .text(' Send only 20 notices in a 10-minutes .')
              .removeClass('warning').addClass('info');
          } else {
            // expired data will be reset on next interaction, but show generic
            $('#message')
              .text('Previous window expired. Click to start a fresh 10-minute count.')
              .removeClass('warning').addClass('info');
          }
        }
      }

function saveCounter(data) {
        // data = { count, expiry } ; expiry in ms (timestamp)
        setCookie("clickData", JSON.stringify(data), 2); // cookie lives 10 minutes
      }




function loadCounter() {
        const cookieData = getCookie("clickData");
        if (cookieData) {
          try {
            const parsed = JSON.parse(cookieData);
            // Ensure structure: { count: number, expiry: number (timestamp ms) }
            if (parsed && typeof parsed === 'object' && typeof parsed.count === 'number' && typeof parsed.expiry === 'number') {
              return parsed;
            }
          } catch (e) {
            // fall through to default
          }
        }
        // default: no clicks, expiry 0 means no window started yet
        return { count: 0, expiry: 0 };
      }


 function handleLinkClick(event) {
        // Prevent default only if limit exceeded
        let data = loadCounter();
        const now = Date.now();

        // Case 1: no expiry set (first click ever) → initialize window
        if (!data.expiry) {
          data.expiry = now + 10 * 60 * 1000; // 10 minutes from now
          data.count = 1; // this click counts
          saveCounter(data);
          updateDisplay(data);
          return; // let link open naturally
        }

        // Case 2: expiry exists, check if window expired
        if (now > data.expiry) {
          // Expired: reset window and count this as first click of new window
          data.count = 1;
          data.expiry = now + 10 * 60 * 1000;
          saveCounter(data);
          updateDisplay(data);
          return; // follow link
        }

        // Case 3: within active window
        if (data.count >= 20) {
          // Limit exceeded: block navigation
          event.preventDefault();
          updateDisplay(data); // ensures message is shown
          return;
        }

        // Within limit, increment
        data.count++;
        console.log("datacount at handleclick function");
        console.log(data.count)
        saveCounter(data);
        updateDisplay(data);
        // allow navigation
      }

class BranchLoginAuth {
            constructor(containerId, jsonUrl) {
                this.container = document.getElementById(containerId);
                this.jsonUrl = jsonUrl;
                this.branchData = [];
                this.selectedBranch = '';
                this.enteredMobile = '';
                
                this.init = this.init.bind(this);
                this.fetchBranchData = this.fetchBranchData.bind(this);
                this.populateBranchSelect = this.populateBranchSelect.bind(this);
                this.handleBranchChange = this.handleBranchChange.bind(this);
                this.handleMobileInput = this.handleMobileInput.bind(this);
                this.handleSubmit = this.handleSubmit.bind(this);
                this.closeLoginPanel = this.closeLoginPanel.bind(this);
                this.setError = this.setError.bind(this);
                this.setStatus = this.setStatus.bind(this);
                this.enableSubmitButton = this.enableSubmitButton.bind(this);
                
                this.init();
            }

            async init() {
                try {
                    // Disable submit button initially
                    this.disableSubmitButton('Loading...');
                    
                    // Fetch data from JSON URL only
                    await this.fetchBranchData();
                    
                    // Populate select with JSON data only
                    this.populateBranchSelect();
                    
                    // Enable submit button
                    this.enableSubmitButton();
                    
                    // Attach events
                    this.attachEvents();
                    
                } catch (error) {
                    console.error('Error loading branch data:', error);
                    this.setError('⚠️ Failed to load branch data from server');
                    this.disableSubmitButton('Retry?');
                    
                    // Add retry option
                    const branchSelect = document.getElementById('branchSelect');
                    if (branchSelect) {
                        branchSelect.innerHTML = '<option value="">⚠️ Failed to load - Refresh page</option>';
                    }
                }
            }

            async fetchBranchData() {
                const response = await fetch(this.jsonUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                this.branchData = await response.json();
                
                if (this.branchData.length === 0) {
                    throw new Error('No branch data available');
                }
            }

            populateBranchSelect() {
                const branchSelect = document.getElementById('branchSelect');
                if (branchSelect && this.branchData.length > 0) {
                    // Create options ONLY from JSON data
                    let options = '<option value="">-- Select Branch --</option>';
                    
                    this.branchData.forEach(branch => {
                        options += `<option value="${branch.name}">🏛️ ${branch.name}</option>`;
                        
                      branches[branch.name] = {
        manager: branch.manager,
        mobile: branch.mobile,
        advocate: branch.advocate,
        advocateMobile: branch.advocatemoible,
        place:branch.place
      };









                    });
                    
                    branchSelect.innerHTML = options;
                }
            }

            disableSubmitButton(text) {
                const submitBtn = document.getElementById('loginSubmitBtn');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = text || 'Loading...';
                }
            }

            enableSubmitButton() {
                const submitBtn = document.getElementById('loginSubmitBtn');
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login to Dashboard';
                }
            }

            attachEvents() {
                const branchSelect = document.getElementById('branchSelect');
                const mobileInput = document.getElementById('mobileInput');
                const submitBtn = document.getElementById('loginSubmitBtn');

                if (branchSelect) {
                    branchSelect.addEventListener('change', this.handleBranchChange);
                }
                if (mobileInput) {
                    mobileInput.addEventListener('input', this.handleMobileInput);
                    mobileInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') this.handleSubmit(e);
                    });
                }
                if (submitBtn) {
                    submitBtn.addEventListener('click', this.handleSubmit);
                }
            }

            handleBranchChange(event) {
                this.selectedBranch = event.target.value;
                console.log("login branch check");
                console.log(this.selectedBranch);
                
                this.setError('');
            }

            handleMobileInput(event) {
                let value = event.target.value.replace(/\D/g, '');
                if (value.length > 10) value = value.slice(0, 10);
                event.target.value = value;
                this.enteredMobile = value;
                this.setError('');
            }

            setError(message) {
                const errorEl = document.getElementById('errorDisplay');
                if (errorEl) errorEl.textContent = message || '';
            }

            setStatus(message) {
                const statusEl = document.getElementById('loginStatus');
                if (statusEl) statusEl.textContent = message || '';
            }

            handleSubmit(event) {
                event.preventDefault();
                
                // Double check if data is loaded
                if (this.branchData.length === 0) {
                    this.setError(' Branch data not loaded. Please refresh.');
                    return;
                }
                
                this.setError('');
                this.setStatus('');

                if (!this.selectedBranch) {
                    this.setError(' Please select a branch');
                    return;
                }

                if (!this.enteredMobile || this.enteredMobile.length !== 10) {
                    this.setError(' Enter valid 10-digit mobile number');
                    return;
                }

                // Match ONLY with JSON data
                const matchedBranch = this.branchData.find(
                    branch => branch.name === this.selectedBranch && 
                             branch.advocatemoible === this.enteredMobile
                );

                if (matchedBranch) {
                    this.setStatus('✅ Login successful! Welcome Adv. ' + matchedBranch.advocate);
                    
                    // Store login state from JSON data
                    sessionStorage.setItem('advocateLoggedIn', 'true');
                    sessionStorage.setItem('advocateBranch', matchedBranch.name);
                    sessionStorage.setItem('advocateName', matchedBranch.advocate);
                    sessionStorage.setItem('advocateMobile', matchedBranch.advocatemoible);
                    sessionStorage.setItem('branchManager', matchedBranch.manager || 'Not assigned');
                    
                    // Close panel after showing success
                    setTimeout(() => {
                        this.closeLoginPanel();
                    }, 1200);
                } else {
                    // Check if branch exists in JSON data
                    if (this.branchData.some(b => b.name === this.selectedBranch)) {
                        this.setError('❌ Mobile number does not match for this branch');
                    } else {
                        this.setError('❌ Invalid branch selection');
                    }
                }
            }

            closeLoginPanel() {
                if (this.container) {
                    this.container.style.transition = 'opacity 0.2s ease';
                    this.container.style.opacity = '0';
                                        setTimeout(() => {
                        console.log(currentBranchFilter);
                        this.container.style.display = 'none';
                         
                         $('#example_filter input').focus();
                        this.container.style.opacity = '1';
                        this.container.style.transition = '';
                        
                        // Dispatch event
                        window.dispatchEvent(new CustomEvent('advocateLoginClosed', {
                            detail: { 
                                success: true,
                                data: this.branchData 
                            }
                        }));
                        
                        console.log('✅ Login panel closed - data loaded from JSON URL only');
                    }, 200);
                }
            }
        }

        // Initialize login when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            // DATA COMES ONLY FROM THIS JSON URL - NO HARDCODED OPTIONS
            const jsonDataUrl = 'https://satyam0524.github.io/advocate/branch.json';
